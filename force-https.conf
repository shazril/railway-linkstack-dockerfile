# Fix mixed-content errors when running behind a TLS-terminating proxy (Railway).
#
# Railway serves the site over HTTPS at its edge but forwards plain HTTP to this
# container on port 80. LinkStack detects "http" and emits http:// asset URLs,
# which the browser blocks as mixed active content on an https page. This header
# tells the browser to auto-upgrade those requests to https://. It is LinkStack's
# own recommended fix for reverse-proxy mixed-content (normally added on the proxy).

# mod_headers may not be loaded by the image's httpd.conf; load it if needed.
<IfModule !headers_module>
LoadModule headers_module /usr/lib/apache2/mod_headers.so
</IfModule>

Header always set Content-Security-Policy "upgrade-insecure-requests"
